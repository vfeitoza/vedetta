  <!-- Confirm Modal -->
  <div class="shortcut-backdrop" id="confirm-backdrop"></div>
  <div class="shortcut-modal" id="confirm-modal" role="dialog">
    <div class="shortcut-modal-header">
      <h2 id="confirm-title">Confirm</h2>
      <button class="btn btn-icon btn-ghost" data-action-click="closeConfirmModal()" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="shortcut-modal-body" style="grid-template-columns:1fr;gap:0.75rem;padding:1rem 1.25rem">
      <p id="confirm-message" style="margin:0;font-size:var(--text-sm);color:var(--text-secondary)"></p>
      <div style="display:flex;gap:0.5rem;justify-content:flex-end">
        <button class="btn btn-sm btn-ghost" data-action-click="closeConfirmModal()">Cancel</button>
        <button class="btn btn-sm btn-primary" id="confirm-btn" style="background:var(--danger)">Delete</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    var objectsData = [];

    function loadObjects() {
      fetch('/api/objects').then(function(r) { return r.json(); }).then(function(data) {
        objectsData = (data && data.items) || data || [];
        renderObjects();
      });
    }

    function renderObjects() {
      var grid = document.getElementById('objects-grid');
      if (!objectsData.length) {
        grid.innerHTML = '<div class="sys-card"><div class="sys-card-body" style="text-align:center;color:var(--text-tertiary);padding:2rem">'
          + 'No tracked objects yet. On any event, click <strong>Track as new</strong> to start tracking an object.'
          + '</div></div>';
        return;
      }

      var html = '';
      objectsData.forEach(function(obj) {
        var thumbStyle = obj.crop_path
          ? 'background-image:url(/api/objects/' + obj.id + '/crop)'
          : '';
        var threshold = (obj.match_threshold != null ? obj.match_threshold : 0.65);
        html += '<div class="sys-card" id="object-' + obj.id + '">'
          + '<div class="sys-card-header" style="gap:0.75rem;padding:0.75rem 1rem">'
          +   '<div class="face-thumb" style="' + thumbStyle + '" aria-hidden="true"></div>'
          +   '<div style="flex:1;min-width:0">'
          +     '<input type="text" class="person-name-input" value="' + escapeAttr(obj.name) + '" '
          +       'data-action-change="renameObject(' + obj.id + ', this.value)" data-action-focus="this.select()">'
          +     '<div style="display:flex;align-items:center;gap:0.375rem;margin-top:0.25rem;font-size:var(--text-xs);color:var(--text-tertiary)">'
          +       '<span>' + escapeHtml(obj.label) + '</span>'
          +       '<span>·</span>'
          +       '<span id="ref-count-' + obj.id + '">0 refs</span>'
          +     '</div>'
          +   '</div>'
          +   '<button class="btn btn-icon btn-ghost" style="color:var(--danger);flex-shrink:0" '
          +     'data-action-click="deleteObject(' + obj.id + ', ' + jsStringArg(obj.name) + ')" '
          +     'aria-label="Delete object">'
          +     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>'
          +   '</button>'
          + '</div>'
          + '<div class="sys-card-body" style="padding:0.75rem 1rem">'
          +   '<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem">'
          +     '<label style="font-size:var(--text-xs);color:var(--text-tertiary);white-space:nowrap">Match threshold</label>'
          +     '<input type="range" min="0.3" max="0.95" step="0.05" value="' + threshold + '" '
          +       'style="flex:1;accent-color:var(--accent)" '
          +       'data-action-input="document.getElementById(\'thresh-val-' + obj.id + '\').textContent=this.value" '
          +       'data-action-change="updateThreshold(' + obj.id + ', parseFloat(this.value))">'
          +     '<span id="thresh-val-' + obj.id + '" style="font-size:var(--text-xs);font-family:var(--font-mono);color:var(--text-secondary);min-width:2.5em;text-align:right">' + threshold + '</span>'
          +   '</div>'
          +   '<div style="font-size:var(--text-xs);color:var(--text-tertiary);margin-bottom:0.375rem">References</div>'
          +   '<div class="face-grid" id="refs-' + obj.id + '" style="margin-bottom:0.875rem">'
          +     '<div style="font-size:var(--text-xs);color:var(--text-tertiary)">Loading...</div>'
          +   '</div>'
          +   '<div style="font-size:var(--text-xs);color:var(--text-tertiary);margin-bottom:0.375rem">Recent sightings</div>'
          +   '<div id="sightings-' + obj.id + '" style="font-size:var(--text-sm);color:var(--text-secondary)">'
          +     '<span style="color:var(--text-tertiary)">Loading...</span>'
          +   '</div>'
          + '</div>'
          + '</div>';
      });
      grid.innerHTML = html;

      objectsData.forEach(function(obj) {
        loadReferences(obj.id);
        loadSightings(obj.id);
      });
    }

    function loadReferences(objectId) {
      fetch('/api/objects/' + objectId + '/references').then(function(r) { return r.json(); }).then(function(data) {
        var refs = (data && data.items) || data || [];
        var container = document.getElementById('refs-' + objectId);
        if (!container) return;
        var countEl = document.getElementById('ref-count-' + objectId);
        if (countEl) countEl.textContent = refs.length + (refs.length === 1 ? ' ref' : ' refs');
        if (!refs.length) {
          container.innerHTML = '<span style="font-size:var(--text-xs);color:var(--text-tertiary)">No references</span>';
          return;
        }
        var html = '';
        refs.forEach(function(ref) {
          var eventURL = ref.event_id ? '/event.html?id=' + encodeURIComponent(ref.event_id) : '';
          var clickAction = eventURL ? 'data-action-click="window.open(' + jsStringArg(eventURL) + ', \'_blank\')"' : '';
          html += '<div class="face-thumb face-thumb--unmatched" '
            + 'style="background-image:url(/api/objects/' + objectId + '/crop?ref=' + ref.id + ');position:relative" '
            + clickAction + ' title="' + (ref.event_id ? 'View source event' : 'Reference image') + '">'
            + '<button class="btn btn-icon btn-ghost" '
            + 'style="position:absolute;top:-4px;right:-4px;width:18px;height:18px;min-width:0;padding:0;background:var(--danger);color:#fff;border-radius:50%;font-size:12px;line-height:1" '
            + 'data-action-click="event.stopPropagation();deleteReference(' + ref.id + ',' + objectId + ')" title="Remove reference">×</button>'
            + '</div>';
        });
        container.innerHTML = html;
      });
    }

    function loadSightings(objectId) {
      fetch('/api/objects/' + objectId + '/sightings?limit=10').then(function(r) { return r.json(); }).then(function(data) {
        var sightings = (data && data.items) || data || [];
        var el = document.getElementById('sightings-' + objectId);
        if (!el) return;
        if (!sightings.length) {
          el.innerHTML = '<span style="color:var(--text-tertiary)">No sightings yet</span>';
          return;
        }
        var html = '';
        sightings.forEach(function(s) {
          var time = new Date(s.timestamp).toLocaleString();
          var sim = Math.round(s.similarity * 100) + '%';
          var simColor = s.similarity >= 0.8 ? 'var(--green)' : s.similarity >= 0.65 ? 'var(--amber)' : 'var(--danger)';
          html += '<div style="display:flex;align-items:center;gap:0.5rem;padding:0.25rem 0;border-top:1px solid var(--border-subtle)">'
            + '<a href="/event.html?id=' + encodeURIComponent(s.event_id) + '" style="color:var(--text-primary);text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:var(--text-xs)">' + escapeHtml(s.camera) + ' · ' + escapeHtml(time) + '</a>'
            + '<span style="font-family:var(--font-mono);font-size:var(--text-xs);color:' + simColor + '">' + sim + '</span>'
            + '<button class="btn btn-icon btn-ghost btn-xs" style="color:var(--danger)" data-action-click="dismissSighting(' + s.id + ',' + objectId + ')" title="Wrong match — dismiss">×</button>'
            + '</div>';
        });
        el.innerHTML = html;
      });
    }

    function deleteObject(id, name) {
      document.getElementById('confirm-title').textContent = 'Delete Object';
      document.getElementById('confirm-message').textContent = 'Delete "' + name + '" and all its sightings?';
      var btn = document.getElementById('confirm-btn');
      btn.textContent = 'Delete';
      btn.style.background = 'var(--danger)';
      btn.onclick = function() {
        closeConfirmModal();
        fetch('/api/objects/' + id, { method: 'DELETE' }).then(function(r) {
          if (!r.ok) throw new Error('Failed');
          loadObjects();
        }).catch(function() {
          if (typeof toast === 'function') toast('Delete failed');
        });
      };
      document.getElementById('confirm-backdrop').classList.add('open');
      document.getElementById('confirm-modal').classList.add('open');
    }

    function closeConfirmModal() {
      document.getElementById('confirm-backdrop').classList.remove('open');
      document.getElementById('confirm-modal').classList.remove('open');
    }

    function renameObject(id, name) {
      fetch('/api/objects/' + id, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: name.trim()})
      }).then(function(r) {
        if (!r.ok) throw new Error('Failed');
        if (typeof toast === 'function') toast('Renamed to ' + name);
      }).catch(function() {
        if (typeof toast === 'function') toast('Rename failed');
      });
    }

    function updateThreshold(id, value) {
      fetch('/api/objects/' + id, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({match_threshold: value})
      }).then(function(r) {
        if (!r.ok) throw new Error('Failed');
        if (typeof toast === 'function') toast('Threshold set to ' + value);
      });
    }

    function dismissSighting(sightingId, objectId) {
      fetch('/api/objects/sightings/' + sightingId, { method: 'DELETE' }).then(function(r) {
        if (!r.ok) throw new Error('Failed');
        loadSightings(objectId);
        if (typeof toast === 'function') toast('Sighting dismissed');
      });
    }

    function deleteReference(refId, objectId) {
      fetch('/api/objects/references/' + refId, { method: 'DELETE' }).then(function(r) {
        if (!r.ok) throw new Error('Failed');
        loadReferences(objectId);
      });
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function escapeAttr(s) {
      return escapeHtml(s);
    }
    function jsStringArg(s) {
      return escapeAttr(JSON.stringify(String(s == null ? '' : s)));
    }

    document.getElementById('confirm-backdrop').addEventListener('click', closeConfirmModal);
    loadObjects();
  </script>
</body>
