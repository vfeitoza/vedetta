<head>
  <meta charset="UTF-8">

  <title>Objects - Vedetta</title>

  <style>
    .object-card { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1rem; }
    .object-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:0.75rem; }
    .object-thumb { width:80px; height:80px; border-radius:var(--radius); background:var(--surface); background-size:cover; background-position:center; flex-shrink:0; }
    .object-info { flex:1; }
    .object-name { font-size:1.1rem; font-weight:600; }
    .object-meta { font-size:var(--text-sm); color:var(--text-tertiary); margin-top:0.25rem; }
    .object-refs { display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:0.5rem; }
    .ref-thumb { width:100px; height:80px; border-radius:var(--radius-sm); background:var(--surface); background-size:cover; background-position:center; border:2px solid transparent; cursor:pointer; position:relative; }
    .ref-thumb:hover { border-color:var(--accent); }
    .ref-delete { position:absolute; top:-6px; right:-6px; width:18px; height:18px; border-radius:50%; background:var(--danger); color:#fff; border:none; font-size:11px; line-height:18px; text-align:center; cursor:pointer; display:none; }
    .ref-thumb:hover .ref-delete { display:block; }
    .object-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(360px, 1fr)); gap:1rem; }
    .empty-state { color:var(--text-tertiary); padding:2rem; text-align:center; }
  </style>
</head>

  <!-- Confirm Modal -->
  <div class="shortcut-backdrop" id="confirm-backdrop"></div>
  <div class="shortcut-modal" id="confirm-modal" role="dialog">
    <div class="shortcut-modal-header">
      <h2 id="confirm-title">Confirm</h2>
      <button class="btn btn-icon btn-ghost" onclick="closeConfirmModal()" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="shortcut-modal-body" style="grid-template-columns:1fr;gap:0.75rem;padding:1rem 1.25rem">
      <p id="confirm-message" style="margin:0;font-size:var(--text-sm);color:var(--text-secondary)"></p>
      <div style="display:flex;gap:0.5rem;justify-content:flex-end">
        <button class="btn btn-sm btn-ghost" onclick="closeConfirmModal()">Cancel</button>
        <button class="btn btn-sm btn-primary" id="confirm-btn" style="background:var(--danger)">Delete</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    var objectsData = [];

    function loadObjects() {
      fetch('/api/objects').then(function(r) { return r.json(); }).then(function(objects) {
        objectsData = objects || [];
        renderObjects();
      });
    }

    function renderObjects() {
      var grid = document.getElementById('objects-grid');
      if (!objectsData.length) {
        grid.innerHTML = '<div class="empty-state">No tracked objects yet. Go to an event and click "Track as new" to start tracking an object.</div>';
        return;
      }

      var html = '';
      objectsData.forEach(function(obj) {
        html += '<div class="object-card" id="object-' + obj.id + '">'
          + '<div class="object-header">'
          + '<div class="object-thumb" style="' + (obj.crop_path ? 'background-image:url(/api/objects/' + obj.id + '/crop)' : '') + '"></div>'
          + '<div class="object-info">'
          + '<input type="text" class="person-name-input" value="' + escapeAttr(obj.name) + '" '
          + 'onchange="renameObject(' + obj.id + ', this.value)" onfocus="this.select()" '
          + 'style="font-size:1.1rem;font-weight:600">'
          + '<div class="object-meta">' + obj.label + ' <span id="ref-count-' + obj.id + '"></span></div>'
          + '<div style="display:flex;align-items:center;gap:0.5rem;margin-top:0.35rem">'
          + '<label style="font-size:var(--text-xs);color:var(--text-tertiary);white-space:nowrap">Threshold</label>'
          + '<input type="range" min="0.3" max="0.95" step="0.05" value="' + (obj.match_threshold || 0.65) + '" '
          + 'style="flex:1;accent-color:var(--accent)" '
          + 'oninput="document.getElementById(\'thresh-val-' + obj.id + '\').textContent=this.value" '
          + 'onchange="updateThreshold(' + obj.id + ', parseFloat(this.value))">'
          + '<span id="thresh-val-' + obj.id + '" style="font-size:var(--text-xs);font-family:var(--font-mono);color:var(--text-secondary);min-width:2.5em">' + (obj.match_threshold || 0.65) + '</span>'
          + '</div>'
          + '</div>'
          + '<button class="btn btn-sm btn-ghost" style="color:var(--danger)" onclick="deleteObject(' + obj.id + ', \'' + escapeAttr(obj.name) + '\')">Delete</button>'
          + '</div>'
          + '<div class="object-refs" id="refs-' + obj.id + '">Loading references...</div>'
          + '<div class="object-sightings" id="sightings-' + obj.id + '" style="margin-top:0.75rem;font-size:var(--text-sm);color:var(--text-tertiary)"></div>'
          + '</div>';
      });
      grid.innerHTML = html;

      objectsData.forEach(function(obj) {
        loadReferences(obj.id);
        loadSightings(obj.id);
      });
    }

    function loadReferences(objectId) {
      fetch('/api/objects/' + objectId + '/references').then(function(r) { return r.json(); }).then(function(refs) {
        var container = document.getElementById('refs-' + objectId);
        if (!container) return;
        if (!refs || !refs.length) {
          container.innerHTML = '<span style="font-size:var(--text-sm);color:var(--text-tertiary)">No reference images</span>';
          return;
        }
        var html = '';
        refs.forEach(function(ref) {
          var clickAction = ref.event_id ? 'onclick="window.open(\'/event.html?id=' + ref.event_id + '\', \'_blank\')"' : '';
          html += '<div class="ref-thumb" style="background-image:url(/api/objects/' + objectId + '/crop?ref=' + ref.id + ')" '
            + clickAction + ' title="' + (ref.event_id ? 'View source event' : 'Reference image') + '">'
            + '<button class="ref-delete" onclick="event.stopPropagation();deleteReference(' + ref.id + ',' + objectId + ')" title="Remove reference">&times;</button>'
            + '</div>';
        });
        container.innerHTML = html;
        var countEl = document.getElementById('ref-count-' + objectId);
        if (countEl) countEl.textContent = '· ' + refs.length + ' reference' + (refs.length !== 1 ? 's' : '');
      });
    }

    function loadSightings(objectId) {
      fetch('/api/objects/' + objectId + '/sightings?limit=10').then(function(r) { return r.json(); }).then(function(sightings) {
        var el = document.getElementById('sightings-' + objectId);
        if (!el) return;
        if (!sightings || !sightings.length) {
          el.innerHTML = '<span>No sightings yet</span>';
          return;
        }
        var html = '<div style="margin-top:0.25rem;font-weight:600;color:var(--text-secondary)">Recent Sightings (' + sightings.length + ')</div>';
        sightings.forEach(function(s) {
          var time = new Date(s.timestamp).toLocaleString();
          var sim = Math.round(s.similarity * 100) + '%';
          var simColor = s.similarity >= 0.8 ? 'var(--green)' : s.similarity >= 0.65 ? 'var(--amber)' : 'var(--danger)';
          html += '<div style="display:flex;align-items:center;gap:0.5rem;padding:0.2rem 0">'
            + '<a href="/event.html?id=' + s.event_id + '" style="color:var(--accent);text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + s.camera + ' — ' + time + '</a>'
            + '<span style="font-family:var(--font-mono);color:' + simColor + '">' + sim + '</span>'
            + '<button class="btn btn-xs btn-ghost" style="color:var(--danger);padding:0 0.25rem;font-size:10px" onclick="dismissSighting(' + s.id + ',' + objectId + ')" title="Wrong match — dismiss">✕</button>'
            + '</div>';
        });
        el.innerHTML = html;
      });
    }

    function deleteObject(id, name) {
      document.getElementById('confirm-title').textContent = 'Delete Object';
      document.getElementById('confirm-message').textContent = 'Delete "' + name + '" and all its sightings?';
      var btn = document.getElementById('confirm-btn');
      btn.textContent = 'Delete';
      btn.style.background = 'var(--danger)';
      btn.onclick = function() {
        closeConfirmModal();
        fetch('/api/objects/' + id, { method: 'DELETE' }).then(function(r) {
          if (!r.ok) throw new Error('Failed');
          loadObjects();
        }).catch(function() {
          if (typeof toast === 'function') toast('Delete failed');
        });
      };
      document.getElementById('confirm-backdrop').classList.add('open');
      document.getElementById('confirm-modal').classList.add('open');
    }

    function closeConfirmModal() {
      document.getElementById('confirm-backdrop').classList.remove('open');
      document.getElementById('confirm-modal').classList.remove('open');
    }

    function renameObject(id, name) {
      fetch('/api/objects/' + id, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: name.trim()})
      }).then(function(r) {
        if (!r.ok) throw new Error('Failed');
        if (typeof toast === 'function') toast('Renamed to ' + name);
      }).catch(function() {
        if (typeof toast === 'function') toast('Rename failed');
      });
    }

    function updateThreshold(id, value) {
      fetch('/api/objects/' + id, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({match_threshold: value})
      }).then(function(r) {
        if (!r.ok) throw new Error('Failed');
        if (typeof toast === 'function') toast('Threshold set to ' + value);
      });
    }

    function dismissSighting(sightingId, objectId) {
      fetch('/api/objects/sightings/' + sightingId, { method: 'DELETE' }).then(function(r) {
        if (!r.ok) throw new Error('Failed');
        loadSightings(objectId);
        if (typeof toast === 'function') toast('Sighting dismissed');
      });
    }

    function deleteReference(refId, objectId) {
      fetch('/api/objects/references/' + refId, { method: 'DELETE' }).then(function(r) {
        if (!r.ok) throw new Error('Failed');
        loadReferences(objectId);
      });
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escapeAttr(s) {
      return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;');
    }

    document.getElementById('confirm-backdrop').addEventListener('click', closeConfirmModal);
    loadObjects();
  </script>
</body>
