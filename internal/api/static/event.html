  <script>
    (function() {
      const id = new URLSearchParams(location.search).get('id');
      if (!id) { location.href = '/events.html'; return; }

      const el = document.getElementById('event-detail');
      el.setAttribute('hx-get', '/partials/event/' + encodeURIComponent(id));
      el.setAttribute('hx-trigger', 'load');
      htmx.process(el);

      el.addEventListener('htmx:afterSwap', function() {
        const root = el.querySelector('.event-detail-root');
        if (!root) return;
        const camera = root.dataset.eventCamera || '';
        const label = root.dataset.eventLabel || '';
        const time = root.dataset.eventTime || '';
        const crumb = document.getElementById('event-breadcrumb');
        if (crumb && camera) crumb.textContent = camera + ' · ' + time;
        if (camera && label) document.title = label + ' · ' + camera + ' - Vedetta';
      });
    })();
  </script>
