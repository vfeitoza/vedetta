    <button class="btn btn-icon btn-ghost" onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle dark/light theme" id="theme-toggle">

    </button>
    <div class="topnav-spacer"></div>
    <div class="conn-status"><span class="conn-dot ok" id="conn-dot"></span><span id="conn-label">Connected</span></div>
  </nav>

  <main class="page">
    <div class="page-header">
      <h1>Events</h1>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="event-search" class="search-input" placeholder="Search events..." aria-label="Search events">
    </div>

    <!-- Label Filter Chips -->
    <div class="chip-bar" id="filter-chips" role="toolbar" aria-label="Event filters">
      <button class="chip active" data-filter="label" data-value="" onclick="toggleChip(this, 'label')">All</button>
      <button class="chip" data-filter="label" data-value="person" onclick="toggleChip(this, 'label')">
        <span class="chip-dot person"></span>Person
      </button>
      <button class="chip" data-filter="label" data-value="car" onclick="toggleChip(this, 'label')">
        <span class="chip-dot car"></span>Car
      </button>
      <button class="chip" data-filter="label" data-value="dog" onclick="toggleChip(this, 'label')">
        <span class="chip-dot dog"></span>Dog
      </button>
      <button class="chip" data-filter="label" data-value="cat" onclick="toggleChip(this, 'label')">
        <span class="chip-dot cat"></span>Cat
      </button>
    </div>

    <!-- Camera Filter Chips -->
    <div class="chip-bar" id="camera-chips" role="toolbar" aria-label="Camera filters">
      <button class="chip active" data-filter="camera" data-value="" onclick="toggleChip(this, 'camera')">All Cameras</button>
    </div>

    <!-- Object Filter Chips (populated dynamically) -->
    <div class="chip-bar" id="object-chips" role="toolbar" aria-label="Object filters" style="display:none">
    </div>

    <!-- Event Gallery -->
    <div class="event-gallery"
         id="events-gallery"
         hx-get="/partials/events-gallery"
         hx-trigger="load"
         hx-swap="innerHTML"
         role="list"
         aria-label="Detection events">
      <div class="loading-state">Loading events...</div>
    </div>

  </main>

  <nav class="bottom-tabs" role="navigation" aria-label="Mobile navigation">

      <a href="/events.html" class="bottom-tab active" aria-current="page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>Events</a>
      <a href="/recordings.html" class="bottom-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>Recordings</a>
      <a href="/people.html" class="bottom-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>People</a>
      <a href="/objects.html" class="bottom-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>Objects</a>
      <a href="/system.html" class="bottom-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>System</a>
    </div>
  </nav>

  <!-- Keyboard Shortcut Modal -->
  <div class="shortcut-backdrop" id="shortcut-backdrop"></div>
  <div class="shortcut-modal" id="shortcut-modal" role="dialog" aria-label="Keyboard shortcuts">
    <div class="shortcut-modal-header">
      <h2>Keyboard Shortcuts</h2>
      <button class="btn btn-icon btn-ghost" onclick="closeShortcutModal()" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="shortcut-modal-body">
      <div class="shortcut-group">
        <h3>Navigation</h3>
        <div class="shortcut-row"><span>Cameras</span><span class="shortcut-keys"><kbd>Ctrl</kbd><span class="plus">+</span><kbd>1</kbd></span></div>
        <div class="shortcut-row"><span>Events</span><span class="shortcut-keys"><kbd>Ctrl</kbd><span class="plus">+</span><kbd>2</kbd></span></div>
        <div class="shortcut-row"><span>Recordings</span><span class="shortcut-keys"><kbd>Ctrl</kbd><span class="plus">+</span><kbd>3</kbd></span></div>
        <div class="shortcut-row"><span>System</span><span class="shortcut-keys"><kbd>Ctrl</kbd><span class="plus">+</span><kbd>4</kbd></span></div>
      </div>
      <div class="shortcut-group">
        <h3>General</h3>
        <div class="shortcut-row"><span>This help</span><span class="shortcut-keys"><kbd>?</kbd></span></div>
        <div class="shortcut-row"><span>Dismiss / Back</span><span class="shortcut-keys"><kbd>Esc</kbd></span></div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toasts"></div>
  <script src="/app.js"></script>
  <script>
    // Initialize search and infinite scroll
    initEventSearch();
    initInfiniteScroll();

    // Populate camera chips from API and fetch event counts
    Promise.all([
      fetch('/api/cameras').then(r => r.json()),
      fetch('/api/events/counts').then(r => r.json()),
      fetch('/api/objects').then(r => r.json())
    ]).then(function([camData, counts, objects]) {
      var byLabel = counts.by_label || {};
      var byCamera = counts.by_camera || {};
      var total = counts.total || 0;

      // Update label chip counts
      var allChip = document.querySelector('.chip[data-filter="label"][data-value=""]');
      if (allChip && total > 0) {
        allChip.innerHTML = 'All <span class="count">' + total + '</span>';
      }
      document.querySelectorAll('.chip[data-filter="label"]').forEach(function(chip) {
        var val = chip.dataset.value;
        if (val && byLabel[val]) {
          var dot = chip.querySelector('.chip-dot');
          var dotHTML = dot ? dot.outerHTML : '';
          var label = val.charAt(0).toUpperCase() + val.slice(1);
          chip.innerHTML = dotHTML + label + ' <span class="count">' + byLabel[val] + '</span>';
        }
      });

      // Create camera chips with counts
      var bar = document.getElementById('camera-chips');
      var allCamChip = document.querySelector('.chip[data-filter="camera"][data-value=""]');
      if (allCamChip && total > 0) {
        allCamChip.innerHTML = 'All Cameras <span class="count">' + total + '</span>';
      }
      (camData.cameras || []).forEach(function(name) {
        var btn = document.createElement('button');
        btn.className = 'chip';
        btn.dataset.filter = 'camera';
        btn.dataset.value = name;
        var displayName = name.replace(/_/g, ' ');
        var countHTML = byCamera[name] ? ' <span class="count">' + byCamera[name] + '</span>' : '';
        btn.innerHTML = displayName + countHTML;
        btn.onclick = function() { toggleChip(this, 'camera'); };
        bar.appendChild(btn);
      });

      // Object filter chips
      if (objects && objects.length > 0) {
        var objBar = document.getElementById('object-chips');
        objBar.style.display = '';
        var allObjBtn = document.createElement('button');
        allObjBtn.className = 'chip active';
        allObjBtn.dataset.filter = 'object';
        allObjBtn.dataset.value = '';
        allObjBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12" style="margin-right:3px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>All Objects';
        allObjBtn.onclick = function() { toggleChip(this, 'object'); };
        objBar.appendChild(allObjBtn);
        objects.forEach(function(obj) {
          var btn = document.createElement('button');
          btn.className = 'chip';
          btn.dataset.filter = 'object';
          btn.dataset.value = obj.name;
          btn.innerHTML = obj.name;
          btn.onclick = function() { toggleChip(this, 'object'); };
          objBar.appendChild(btn);
        });
      }
    });
  </script>
</body>
