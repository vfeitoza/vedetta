    </div>

    <!-- Label Filter Chips -->
    <div class="chip-bar" id="filter-chips" role="toolbar" aria-label="Event filters">
      <button class="chip active" data-filter="label" data-value="" data-action-click="toggleChip(this, 'label')">All</button>
      <button class="chip" data-filter="label" data-value="person" data-action-click="toggleChip(this, 'label')">
        <span class="chip-dot person"></span>Person
      </button>
      <button class="chip" data-filter="label" data-value="car" data-action-click="toggleChip(this, 'label')">
        <span class="chip-dot car"></span>Car
      </button>
      <button class="chip" data-filter="label" data-value="dog" data-action-click="toggleChip(this, 'label')">
        <span class="chip-dot dog"></span>Dog
      </button>
      <button class="chip" data-filter="label" data-value="cat" data-action-click="toggleChip(this, 'label')">
        <span class="chip-dot cat"></span>Cat
      </button>
    </div>

    <!-- Camera Filter Chips -->
    <div class="chip-bar" id="camera-chips" role="toolbar" aria-label="Camera filters">
      <button class="chip active" data-filter="camera" data-value="" data-action-click="toggleChip(this, 'camera')">All Cameras</button>
    </div>

    <!-- Object Filter Chips (populated dynamically) -->
    <div class="chip-bar" id="object-chips" role="toolbar" aria-label="Object filters" style="display:none">
    </div>

    <!-- Event Gallery -->

  <script src="/app.js"></script>
  <script>
    // Initialize search and infinite scroll
    initEventSearch();
    initInfiniteScroll();

    // Refresh the gallery when a new event arrives via SSE, but only when
    // the user is at the top of the list and no filters are applied, to avoid
    // disturbing their scroll position mid-browse.
    document.addEventListener('vedetta:event', function() {
      var gallery = document.getElementById('events-gallery');
      if (!gallery) return;
      if (window.scrollY > 200) return;
      var params = new URLSearchParams(window.location.search);
      if (params.get('q') || params.get('camera') || params.get('label')) return;
      if (window.htmx && typeof htmx.ajax === 'function') {
        htmx.ajax('GET', '/partials/events-gallery', { target: gallery, swap: 'innerHTML' });
      }
    });

    // Populate camera chips from API and fetch event counts
    Promise.all([
      fetch('/api/cameras').then(r => r.json()),
      fetch('/api/events/counts').then(r => r.json()),
      fetch('/api/objects').then(r => r.json()).then(d => d.items || d || [])
    ]).then(function([camData, counts, objects]) {
      var byLabel = counts.by_label || {};
      var byCamera = counts.by_camera || {};
      var total = counts.total || 0;

	      // Update label chip counts
	      var allChip = document.querySelector('.chip[data-filter="label"][data-value=""]');
	      if (allChip && total > 0) {
	        allChip.textContent = 'All ';
	        var totalCount = document.createElement('span');
	        totalCount.className = 'count';
	        totalCount.textContent = total;
	        allChip.appendChild(totalCount);
	      }
	      document.querySelectorAll('.chip[data-filter="label"]').forEach(function(chip) {
	        var val = chip.dataset.value;
	        if (val && byLabel[val]) {
	          var dot = chip.querySelector('.chip-dot');
	          var label = val.charAt(0).toUpperCase() + val.slice(1);
	          chip.textContent = '';
	          if (dot) chip.appendChild(dot.cloneNode(true));
	          chip.appendChild(document.createTextNode(label + ' '));
	          var count = document.createElement('span');
	          count.className = 'count';
	          count.textContent = byLabel[val];
	          chip.appendChild(count);
	        }
	      });

      // Create camera chips with counts
      var bar = document.getElementById('camera-chips');
	      var allCamChip = document.querySelector('.chip[data-filter="camera"][data-value=""]');
	      if (allCamChip && total > 0) {
	        allCamChip.textContent = 'All Cameras ';
	        var allCamCount = document.createElement('span');
	        allCamCount.className = 'count';
	        allCamCount.textContent = total;
	        allCamChip.appendChild(allCamCount);
	      }
	      ((camData.items || []).map(function(c) { return c.name; })).forEach(function(name) {
	        var btn = document.createElement('button');
	        btn.className = 'chip';
	        btn.dataset.filter = 'camera';
	        btn.dataset.value = name;
	        var displayName = name.replace(/_/g, ' ');
	        btn.textContent = displayName;
	        if (byCamera[name]) {
	          btn.appendChild(document.createTextNode(' '));
	          var camCount = document.createElement('span');
	          camCount.className = 'count';
	          camCount.textContent = byCamera[name];
	          btn.appendChild(camCount);
	        }
	        btn.onclick = function() { toggleChip(this, 'camera'); };
	        bar.appendChild(btn);
	      });

      // Object filter chips
      if (objects && objects.length > 0) {
        var objBar = document.getElementById('object-chips');
        objBar.style.display = '';
        var allObjBtn = document.createElement('button');
        allObjBtn.className = 'chip active';
        allObjBtn.dataset.filter = 'object';
        allObjBtn.dataset.value = '';
        allObjBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12" style="margin-right:3px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>All Objects';
        allObjBtn.onclick = function() { toggleChip(this, 'object'); };
        objBar.appendChild(allObjBtn);
	        objects.forEach(function(obj) {
	          var btn = document.createElement('button');
	          btn.className = 'chip';
	          btn.dataset.filter = 'object';
	          btn.dataset.value = obj.name;
	          btn.textContent = obj.name;
	          btn.onclick = function() { toggleChip(this, 'object'); };
	          objBar.appendChild(btn);
	        });
      }
    });
  </script>
