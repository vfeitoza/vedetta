<!DOCTYPE html>
<html lang="en">

</head>
<body data-shortcuts="nav,camera,events,general">

        <circle cx="12" cy="12" r="3"/>

    <div class="topnav-links">
      <a href="/" class="topnav-link active" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Cameras
      </a>
      <a href="/events.html" class="topnav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>
        Events
      </a>
      <a href="/recordings.html" class="topnav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
        Recordings
      </a>
      <a href="/people.html" class="topnav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        People
      </a>
      <a href="/objects.html" class="topnav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>Objects</a>
      <a href="/settings.html" class="topnav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>Settings</a>
    </div>

    <button class="btn btn-icon btn-ghost" data-action-click="toggleTheme()" aria-label="Toggle theme" title="Toggle dark/light theme" id="theme-toggle">
      <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>

    <button class="btn btn-icon btn-ghost" data-action-click="openAccountModal()" aria-label="Account" title="Account">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </button>

    <div class="topnav-spacer"></div>

    <a href="/settings.html" class="conn-status" title="System health"><span class="conn-dot ok" id="conn-dot"></span><span id="conn-label">Connected</span></a>

    <div class="topnav-status" id="topnav-status"
         hx-get="/partials/system-status"
         hx-trigger="load, every 10s"
         hx-swap="innerHTML">
    </div>
  </nav>

  <!-- Main Content -->
  <main class="page">
    <!-- Stats Row -->
    <div class="stats-row"
         id="stats-row"
         hx-get="/partials/dashboard-stats"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div class="stat-card"><div class="stat-label">Cameras</div><div class="stat-value skeleton" style="width:2ch;height:1.25rem">&nbsp;</div></div>
      <div class="stat-card"><div class="stat-label">Online</div><div class="stat-value skeleton" style="width:2ch;height:1.25rem">&nbsp;</div></div>
      <div class="stat-card"><div class="stat-label">Events Today</div><div class="stat-value skeleton" style="width:2ch;height:1.25rem">&nbsp;</div></div>
      <div class="stat-card"><div class="stat-label">Storage</div><div class="stat-value skeleton" style="width:4ch;height:1.25rem">&nbsp;</div></div>
    </div>

    <!-- Camera Grid -->
    <div class="page-header" style="display:flex;align-items:center;gap:0.75rem">
      <h1>Cameras</h1>
      <button class="btn btn-secondary btn-sm" style="margin-left:auto" data-action-click="openAddCameraModal()">Add Camera</button>
      <div class="density-selector" title="Tile density">
        <button class="density-btn" data-density="compact" data-action-click="setDashboardDensity('compact')" title="Compact tiles">
          <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14"><rect x="1" y="1" width="5" height="5" rx="1"/><rect x="7.5" y="1" width="5" height="5" rx="1"/><rect x="1" y="7.5" width="5" height="5" rx="1"/><rect x="7.5" y="7.5" width="5" height="5" rx="1"/></svg>
        </button>
        <button class="density-btn active" data-density="default" data-action-click="setDashboardDensity('default')" title="Default tiles">
          <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14"><rect x="1" y="1" width="6.5" height="6.5" rx="1"/><rect x="8.5" y="1" width="6.5" height="6.5" rx="1"/><rect x="1" y="8.5" width="6.5" height="6.5" rx="1"/><rect x="8.5" y="8.5" width="6.5" height="6.5" rx="1"/></svg>
        </button>
        <button class="density-btn" data-density="large" data-action-click="setDashboardDensity('large')" title="Large tiles">
          <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14"><rect x="1" y="1" width="14" height="6.5" rx="1"/><rect x="1" y="8.5" width="14" height="6.5" rx="1"/></svg>
        </button>
      </div>
      <div class="view-toggle">
        <button class="btn btn-sm active" id="btn-grid-view" data-action-click="setView('grid')" title="Grid view">Grid</button>
        <button class="btn btn-sm" id="btn-birdseye-view" data-action-click="setView('birdseye')" title="Birdseye view — mosaic of all cameras" aria-label="Birdseye view (mosaic of all cameras)">Birdseye</button>
      </div>
    </div>

    <div class="camera-grid"
         id="camera-grid"
         hx-get="/partials/camera-grid"
         hx-trigger="load"
         hx-swap="innerHTML"
         role="list"
         aria-label="Camera feeds">
      <div class="loading-state">Loading cameras...</div>
    </div>

    <div class="birdseye-grid" id="birdseye-grid" style="display:none" role="list" aria-label="Birdseye camera view">
    </div>
  </main>

  <!-- Mobile Bottom Tabs -->
  <nav class="bottom-tabs" role="navigation" aria-label="Mobile navigation">
    <div class="bottom-tabs-inner">
      <a href="/" class="bottom-tab active" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Cameras
      </a>
      <a href="/events.html" class="bottom-tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>
        Events
      </a>
      <a href="/recordings.html" class="bottom-tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
        Recordings
      </a>
      <a href="/people.html" class="bottom-tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        People
      </a>
      <a href="/objects.html" class="bottom-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>Objects</a>
      <a href="/settings.html" class="bottom-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>Settings</a>
    </div>
  </nav>

  <!-- Keyboard Shortcut Modal -->
  <!-- Account Modal -->
  <div class="shortcut-backdrop" id="account-backdrop"></div>
  <div class="shortcut-modal" id="account-modal" role="dialog" aria-modal="true" aria-label="Account">
    <div class="shortcut-modal-header">
      <h2>Account</h2>
      <button class="btn btn-icon btn-ghost" data-action-click="closeAccountModal()" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="shortcut-modal-body" style="display:block">
      <div style="margin-bottom:1.25rem">
        <span class="stat-label">SIGNED IN AS</span>
        <div id="account-username" style="font-weight:600;margin-top:0.25rem"></div>
        <div id="account-auth-method" style="font-size:var(--text-xs);color:var(--text-tertiary);margin-top:0.25rem"></div>
      </div>
      <div id="account-actions" style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border-subtle);display:flex;flex-direction:column;gap:0.5rem">
        <div id="change-password-section">
          <a href="/settings.html#password-card" class="btn btn-ghost" style="width:100%;font-size:var(--text-sm);text-decoration:none;text-align:center">Change Password</a>
        </div>
        <button id="account-logout-btn" class="btn btn-ghost" style="width:100%;color:var(--text-secondary);font-size:var(--text-sm)">Sign Out</button>
      </div>
    </div>
  </div>

  <!-- Add Camera Modal -->
  <div class="shortcut-backdrop" id="add-camera-backdrop"></div>
  <div class="shortcut-modal" id="add-camera-modal" role="dialog" aria-modal="true" aria-label="Add camera">
    <div class="shortcut-modal-header">
      <h2>Add Camera</h2>
      <button class="btn btn-icon btn-ghost" data-action-click="closeAddCameraModal()" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="shortcut-modal-body" style="grid-template-columns:1fr;padding:1rem 1.25rem">
      <form id="add-camera-form">
        <div style="margin-bottom:0.75rem">
          <label for="addcam-name" style="font-size:0.85rem;color:var(--muted);margin-bottom:0.25rem;display:block">Name</label>
          <input type="text" id="addcam-name" class="form-input">
          <div id="addcam-name-error" class="rtsp-test-result" aria-live="polite"></div>
        </div>
        <div style="margin-bottom:0.75rem">
          <label for="addcam-url" style="font-size:0.85rem;color:var(--muted);margin-bottom:0.25rem;display:block">URL</label>
          <div style="display:flex;gap:0.5rem">
            <input type="text" id="addcam-url" placeholder="rtsp://..." class="form-input" style="flex:1">
            <button type="button" class="btn btn-sm btn-ghost" data-action-click="testRtspFromInput('addcam-url','addcam-url-result')">Test</button>
          </div>
          <div id="addcam-url-result" class="rtsp-test-result" aria-live="polite"></div>
        </div>
        <div style="margin-bottom:0.75rem">
          <label for="addcam-recurl" style="font-size:0.85rem;color:var(--muted);margin-bottom:0.25rem;display:block">Record URL</label>
          <div style="display:flex;gap:0.5rem">
            <input type="text" id="addcam-recurl" placeholder="rtsp://... (optional, uses URL if empty)" class="form-input" style="flex:1">
            <button type="button" class="btn btn-sm btn-ghost" data-action-click="testRtspFromInput('addcam-recurl','addcam-recurl-result')">Test</button>
          </div>
          <div id="addcam-recurl-result" class="rtsp-test-result" aria-live="polite"></div>
        </div>
        <div style="margin-bottom:0.75rem">
          <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer">
            <input type="checkbox" id="addcam-enabled" checked style="width:18px;height:18px;accent-color:var(--accent)">
            <span>Enabled</span>
          </label>
        </div>
        <div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.5rem">Detection Stream</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:0.5rem;margin-bottom:0.75rem">
          <div><label style="font-size:0.8rem;color:var(--muted)">W</label><input type="number" id="addcam-dw" value="640" class="form-input-sm"></div>
          <div><label style="font-size:0.8rem;color:var(--muted)">H</label><input type="number" id="addcam-dh" value="480" class="form-input-sm"></div>
          <div><label style="font-size:0.8rem;color:var(--muted)">FPS</label><input type="number" id="addcam-df" value="5" class="form-input-sm"></div>
          <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.85rem"><input type="checkbox" id="addcam-det-enabled" checked style="accent-color:var(--accent)">On</label>
        </div>
        <div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.5rem">Record Stream</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem;margin-bottom:1rem">
          <div><label style="font-size:0.8rem;color:var(--muted)">W</label><input type="number" id="addcam-rw" value="1920" class="form-input-sm"></div>
          <div><label style="font-size:0.8rem;color:var(--muted)">H</label><input type="number" id="addcam-rh" value="1080" class="form-input-sm"></div>
          <div><label style="font-size:0.8rem;color:var(--muted)">FPS</label><input type="number" id="addcam-rf" value="15" class="form-input-sm"></div>
        </div>
        <div style="display:flex;gap:0.5rem;justify-content:flex-end">
          <button type="button" class="btn btn-sm btn-ghost" data-action-click="closeAddCameraModal()">Cancel</button>
          <button type="button" class="btn btn-sm btn-primary" data-action-click="addNewCamera()">Add</button>
        </div>
        <div id="add-camera-status" style="min-height:1.3rem;margin-top:0.5rem;font-size:0.92rem;color:var(--muted)"></div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toasts"></div>
  <script src="/app.js"></script>
  <script>
    function openAddCameraModal() {
      document.getElementById('add-camera-backdrop').classList.add('open');
      document.getElementById('add-camera-modal').classList.add('open');
      setTimeout(function() {
        var nameField = document.getElementById('addcam-name');
        if (nameField) nameField.focus();
      }, 100);
    }
    function closeAddCameraModal() {
      document.getElementById('add-camera-backdrop').classList.remove('open');
      document.getElementById('add-camera-modal').classList.remove('open');
      if (typeof clearAddCamErrors === 'function') clearAddCamErrors();
      var status = document.getElementById('add-camera-status');
      if (status) { status.textContent = ''; status.style.color = ''; }
      _addCameraPending = false;
    }
    function setAddCamFieldError(fieldId, errorId, msg) {
      var field = document.getElementById(fieldId);
      var err = document.getElementById(errorId);
      if (err) { err.textContent = msg; err.className = 'rtsp-test-result' + (msg ? ' error' : ''); }
      if (field) { field.style.borderColor = msg ? 'var(--danger)' : ''; }
    }
    function clearAddCamErrors() {
      setAddCamFieldError('addcam-name', 'addcam-name-error', '');
      setAddCamFieldError('addcam-url', 'addcam-url-result', '');
    }
    var _addCameraPending = false;
    function addNewCamera() {
      if (_addCameraPending) return;
      var $ = function(id) { return document.getElementById(id); };
      var status = $('add-camera-status');
      var name = $('addcam-name').value.trim();
      var url = $('addcam-url').value.trim();
      clearAddCamErrors();
      if (!name) { setAddCamFieldError('addcam-name', 'addcam-name-error', 'Name is required'); $('addcam-name').focus(); return; }
      if (!url) { setAddCamFieldError('addcam-url', 'addcam-url-result', 'URL is required'); $('addcam-url').focus(); return; }
      _addCameraPending = true;
      status.textContent = 'Adding...';
      status.style.color = 'var(--muted)';
      var intOr = function(id, def) { var v = parseInt($(id).value); return isNaN(v) ? def : v; };
      fetch('/api/cameras/manage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: name,
          url: url,
          record_url: $('addcam-recurl').value,
          enabled: $('addcam-enabled').checked,
          detect: { width: intOr('addcam-dw', 640), height: intOr('addcam-dh', 480), fps: intOr('addcam-df', 5), enabled: $('addcam-det-enabled').checked },
          record: { width: intOr('addcam-rw', 1920), height: intOr('addcam-rh', 1080), fps: intOr('addcam-rf', 15) }
        })
      }).then(function(r) { return r.json(); }).then(function(data) {
        if (data && data.error) {
          status.textContent = data.error;
          status.style.color = 'var(--danger)';
          _addCameraPending = false;
        } else {
          status.textContent = 'Added — restart required';
          status.style.color = 'var(--success)';
          setTimeout(function() { location.reload(); }, 800);
        }
      }).catch(function() {
        status.textContent = 'Add failed';
        status.style.color = 'var(--danger)';
        _addCameraPending = false;
      });
    }
    document.getElementById('add-camera-backdrop').addEventListener('click', closeAddCameraModal);
  </script>
</body>
</html>
