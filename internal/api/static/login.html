<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Vedetta Login</title>
  <meta name="theme-color" content="#0a0e14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="apple-mobile-web-app-title" content="Vedetta">
  <link rel="stylesheet" href="/style.css">
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(10, 24, 38, 0.92);
      --panel-edge: rgba(125, 179, 255, 0.18);
      --muted: #9fb4c6;
      --accent-strong: #1baee6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: var(--font-ui);
      background:
        radial-gradient(circle at top, rgba(93, 215, 255, 0.18), transparent 35%),
        linear-gradient(180deg, #0a1621 0%, var(--bg) 100%);
      color: var(--text);
    }
    .shell {
      width: min(420px, calc(100vw - 2rem));
      padding: 2rem;
      border: 1px solid var(--panel-edge);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(20px);
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.8rem;
      letter-spacing: 0.02em;
    }
    p {
      margin: 0 0 1.5rem;
      color: var(--muted);
      line-height: 1.5;
    }
    label {
      display: block;
      margin-bottom: 0.35rem;
      font-size: 0.92rem;
      color: var(--muted);
    }
    input {
      width: 100%;
      margin-bottom: 1rem;
      padding: 0.85rem 0.95rem;
      border: 1px solid rgba(159, 180, 198, 0.2);
      border-radius: 12px;
      background: rgba(4, 12, 18, 0.7);
      color: var(--text);
      font-size: 1rem;
    }
    button {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(90deg, var(--accent), var(--accent-strong));
      color: #03111b;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    button[disabled] {
      opacity: 0.7;
      cursor: wait;
    }
    .status {
      min-height: 1.3rem;
      margin-top: 1rem;
      font-size: 0.92rem;
      color: var(--muted);
    }
    .status.error {
      color: var(--danger);
    }
    input:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .password-wrap {
      position: relative;
      margin-bottom: 1rem;
    }
    .password-wrap input {
      padding-right: 2.8rem;
      margin-bottom: 0;
    }
    .pw-toggle {
      position: absolute;
      top: 50%;
      right: 0.65rem;
      transform: translateY(-50%);
      width: 2rem;
      height: 2rem;
      padding: 0;
      background: transparent;
      border: 0;
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pw-toggle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .pw-toggle:hover {
      color: var(--text);
    }
    .remember-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding: 0.35rem 0;
      cursor: pointer;
      font-size: 0.92rem;
      color: var(--muted);
    }
    .remember-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1>Vedetta</h1>
    <p>Sign in to continue.</p>
    <form id="login-form">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" autocapitalize="none" autocorrect="off" autofocus required>
      <label for="password">Password</label>
      <div class="password-wrap">
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button type="button" class="pw-toggle" id="pw-toggle" aria-pressed="false" aria-label="Show password">
          <svg id="pw-icon-show" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7S2 12 2 12z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="pw-icon-hide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      <label class="remember-label">
        <input type="checkbox" id="remember" checked>
        Remember me
      </label>
      <button id="submit" type="submit">Sign In</button>
      <div class="status" id="status" role="alert" aria-live="assertive" aria-atomic="true"></div>
    </form>
  </main>

  <script src="/safehref.js"></script>
  <script>
    (function() {
      var form = document.getElementById('login-form');
      var statusEl = document.getElementById('status');
      var submit = document.getElementById('submit');
      var nextRaw = new URLSearchParams(location.search).get('next');

      // Password visibility toggle
      var pwToggle = document.getElementById('pw-toggle');
      var pwField = document.getElementById('password');
      var pwIconShow = document.getElementById('pw-icon-show');
      var pwIconHide = document.getElementById('pw-icon-hide');
      pwToggle.addEventListener('click', function() {
        var isPassword = pwField.type === 'password';
        pwField.type = isPassword ? 'text' : 'password';
        pwToggle.setAttribute('aria-pressed', isPassword ? 'true' : 'false');
        pwToggle.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
        pwIconShow.style.display = isPassword ? 'none' : '';
        pwIconHide.style.display = isPassword ? '' : 'none';
      });

      function setStatus(message, isError) {
        statusEl.textContent = message || '';
        statusEl.className = isError ? 'status error' : 'status';
      }

      form.addEventListener('submit', function(event) {
        event.preventDefault();
        submit.disabled = true;
        setStatus('Signing in…', false);

        fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
            remember: document.getElementById('remember').checked
          })
        })
          .then(function(resp) {
            return resp.json().then(function(body) {
              if (!resp.ok) throw new Error(body.error || 'Login failed');
              return body;
            });
          })
          .then(function() {
            location.href = safeRedirectPath(nextRaw, location.origin);
          })
          .catch(function(err) {
            setStatus(err.message, true);
            submit.disabled = false;
          });
      });
    })();
  </script>
</body>
</html>
