<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Recordings - Watchpost</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  <meta name="theme-color" content="#0a0e14">
</head>
<body>

  <nav class="topnav" role="navigation" aria-label="Main">
    <a href="/" class="topnav-brand" aria-label="Watchpost home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
      <span>watchpost</span>
    </a>
    <div class="topnav-links">
      <a href="/" class="topnav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Cameras</a>
      <a href="/events.html" class="topnav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>Events</a>
      <a href="/recordings.html" class="topnav-link active" aria-current="page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>Recordings</a>
      <a href="/system.html" class="topnav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>System</a>
    </div>
    <div class="topnav-spacer"></div>
  </nav>

  <main class="page">
    <div class="page-header">
      <h1>Recordings</h1>
    </div>

    <div class="recordings-layout">
      <aside>
        <div class="calendar-card">
          <div class="calendar-header">
            <button class="btn btn-icon btn-sm" onclick="calendarNav(-1)" aria-label="Previous month">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span id="calendar-month">March 2026</span>
            <button class="btn btn-icon btn-sm" onclick="calendarNav(1)" aria-label="Next month">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
          <div class="calendar-grid" id="calendar-grid">
            <span class="calendar-day-label">S</span>
            <span class="calendar-day-label">M</span>
            <span class="calendar-day-label">T</span>
            <span class="calendar-day-label">W</span>
            <span class="calendar-day-label">T</span>
            <span class="calendar-day-label">F</span>
            <span class="calendar-day-label">S</span>
          </div>
        </div>

        <div class="camera-select">
          <label for="rec-camera">Camera</label>
          <select id="rec-camera" onchange="loadRecordings()">
            <option value="">All Cameras</option>
          </select>
        </div>
      </aside>

      <div class="recordings-detail" id="recordings-detail"
           hx-get="/partials/recordings"
           hx-trigger="load"
           hx-swap="innerHTML">
        <div class="loading-state">Select a date to view recordings</div>
      </div>
    </div>
  </main>

  <nav class="bottom-tabs" role="navigation" aria-label="Mobile navigation">
    <div class="bottom-tabs-inner">
      <a href="/" class="bottom-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Cameras</a>
      <a href="/events.html" class="bottom-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>Events</a>
      <a href="/recordings.html" class="bottom-tab active" aria-current="page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>Recordings</a>
      <a href="/system.html" class="bottom-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>System</a>
    </div>
  </nav>

  <div class="toast-container" id="toasts"></div>
  <script src="/app.js"></script>
  <script>
    // Populate camera select
    fetch('/api/cameras').then(r => r.json()).then(data => {
      const sel = document.getElementById('rec-camera');
      (data.cameras || []).forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name.replace(/_/g, ' ');
        sel.appendChild(opt);
      });
    });

    initCalendar();
  </script>
</body>
</html>
