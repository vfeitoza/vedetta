openapi: "3.1.0"
info:
  title: Vedetta NVR API
  version: "0.1.0"
  description: API for managing cameras, events, recordings, and object detection in the Vedetta Network Video Recorder.

servers:
  - url: /

security:
  - bearerAuth: []
  - cookieAuth: []

tags:
  - name: auth
    description: Authentication, sessions, and API tokens
  - name: cameras
    description: Camera management, snapshots, PTZ, zones, and doorbell
  - name: discovery
    description: API discovery and documentation
  - name: health
    description: Health checks, system info, and metrics

paths:
  /api/auth/login:
    post:
      operationId: login
      summary: Authenticate with username and password
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/logout:
    post:
      operationId: logout
      summary: End the current session
      tags: [auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"

  /api/auth/me:
    get:
      operationId: getAuthMe
      summary: Get the current authenticated principal
      tags: [auth]
      responses:
        "200":
          description: Current principal info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/change-password:
    post:
      operationId: changePassword
      summary: Change the current user's password
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/tokens:
    post:
      operationId: createToken
      summary: Create a new API token
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTokenRequest"
      responses:
        "201":
          description: Token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTokenResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/tokens/{id}:
    delete:
      operationId: deleteToken
      summary: Revoke an API token
      tags: [auth]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenRevokedResponse"

  /api/openapi.json:
    get:
      operationId: getOpenAPISpec
      summary: OpenAPI specification
      tags: [discovery]
      security: []
      responses:
        "200":
          description: The OpenAPI spec as JSON
          content:
            application/json:
              schema:
                type: object

  /api/health:
    get:
      operationId: getHealth
      summary: Full health check
      tags: [health]
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/health/live:
    get:
      operationId: getHealthLive
      summary: Liveness probe
      tags: [health]
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthLiveResponse"

  /api/health/ready:
    get:
      operationId: getHealthReady
      summary: Readiness probe
      tags: [health]
      security: []
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReadyResponse"
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReadyResponse"

  /api/system:
    get:
      operationId: getSystem
      summary: System information
      tags: [health]
      responses:
        "200":
          description: System info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemResponse"

  /api/system/recompress/trigger:
    post:
      operationId: triggerRecompression
      summary: Trigger manual recompression
      tags: [health]
      responses:
        "202":
          description: Recompression started
        "409":
          description: Recompression already in progress
          content:
            text/plain:
              schema:
                type: string

  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus metrics
      tags: [health]
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

  /api/cameras:
    get:
      operationId: listCameras
      summary: List all cameras
      tags: [cameras]
      responses:
        "200":
          description: Camera list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CameraListEnvelope"

  /api/cameras/{name}:
    get:
      operationId: getCamera
      summary: Get camera detail
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Camera detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CameraDetail"
        "404":
          description: Camera not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cameras/{name}/snapshot:
    get:
      operationId: getCameraSnapshot
      summary: Get live camera snapshot
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: JPEG snapshot
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "404":
          description: Camera not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cameras/{name}/thumbnail:
    get:
      operationId: getCameraThumbnail
      summary: Get recording thumbnail at a given time
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: t
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: JPEG thumbnail
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid time parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Camera not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cameras/{name}/ptz:
    post:
      operationId: sendPTZCommand
      summary: Send a PTZ command to a camera
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PTZRequest"
      responses:
        "200":
          description: PTZ command accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          description: Invalid request or camera does not support PTZ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Camera not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cameras/{name}/doorbell:
    post:
      operationId: pressDoorbell
      summary: Trigger a doorbell press event
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Doorbell event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoorbellResponse"
        "404":
          description: Camera not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: No snapshot available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cameras/{name}/zones:
    get:
      operationId: listZones
      summary: List zones for a camera
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Zone list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Zone"
        "404":
          description: Camera not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createZone
      summary: Create a zone for a camera
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateZoneRequest"
      responses:
        "201":
          description: Zone created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Zone"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Camera not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cameras/{name}/zones/{zone}:
    put:
      operationId: updateZone
      summary: Update a zone
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: zone
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateZoneRequest"
      responses:
        "200":
          description: Zone updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Zone"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Camera or zone not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteZone
      summary: Delete a zone
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: zone
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Zone deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusDeleted"
        "404":
          description: Camera not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cameras/{name}/zones/{zone}/presence:
    get:
      operationId: getZonePresence
      summary: Get presence state for a zone
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: zone
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Zone presence state
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ZonePresence"
        "404":
          description: Camera or zone not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    cookieAuth:
      type: apiKey
      in: cookie
      name: session

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
        remember:
          type: boolean

    LoginResponse:
      type: object
      required: [username, kind, csrf_token, expires_at]
      properties:
        username:
          type: string
        kind:
          type: string
        csrf_token:
          type: string
        expires_at:
          type: string
          format: date-time

    LogoutResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [logged_out]

    AuthMeResponse:
      type: object
      required: [username, kind, scopes]
      properties:
        username:
          type: string
        kind:
          type: string
        scopes:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
        csrf_token:
          type: string

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string

    CreateTokenRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string

    CreateTokenResponse:
      type: object
      required: [id, name, token, token_prefix, scopes, created_at]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        token:
          type: string
        token_prefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    TokenRevokedResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [revoked]

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    StatusOk:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    StatusDeleted:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [deleted]

    CameraInfo:
      type: object
      required: [name, online, has_motion, ptz]
      properties:
        name:
          type: string
        online:
          type: boolean
        has_motion:
          type: boolean
        ptz:
          type: boolean

    CameraListEnvelope:
      type: object
      required: [items, total, limit, offset, has_more]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CameraInfo"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        has_more:
          type: boolean

    CameraDetail:
      type: object
      required: [name, online, has_motion, degraded, ptz, zone_count, recording]
      properties:
        name:
          type: string
        online:
          type: boolean
        has_motion:
          type: boolean
        degraded:
          type: boolean
        degraded_reason:
          type: string
        last_frame:
          type: string
          format: date-time
        ptz:
          type: boolean
        zone_count:
          type: integer
        recording:
          type: boolean

    Zone:
      type: object
      required: [id, camera, name, points, labels, track_presence, face_recognition, enabled]
      properties:
        id:
          type: integer
        camera:
          type: string
        name:
          type: string
        points:
          type: array
          items:
            type: array
            items:
              type: number
        labels:
          type: array
          items:
            type: string
        track_presence:
          type: boolean
        face_recognition:
          type: boolean
        enabled:
          type: boolean

    CreateZoneRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        points:
          type: array
          items:
            type: array
            items:
              type: number
        x1:
          type: number
        y1:
          type: number
        x2:
          type: number
        y2:
          type: number
        labels:
          type: array
          items:
            type: string
        track_presence:
          type: boolean
        face_recognition:
          type: boolean
        enabled:
          type: boolean

    PTZRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [move, stop, zoom]
        direction:
          type: string
          enum: [up, down, left, right, in, out]

    ZonePresence:
      type: object
      required: [zone_id, label, present]
      properties:
        zone_id:
          type: integer
        label:
          type: string
        present:
          type: boolean
        last_seen:
          type: string
          format: date-time
        last_changed:
          type: string
          format: date-time

    DoorbellResponse:
      type: object
      required: [event_id, camera, person]
      properties:
        event_id:
          type: string
        camera:
          type: string
        person:
          type: string

    ListEnvelope:
      type: object
      required: [items, total, limit, offset, has_more]
      properties:
        items:
          type: array
          items: {}
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        has_more:
          type: boolean

    HealthResponse:
      type: object
      required: [status, checks, version, uptime]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        checks:
          $ref: "#/components/schemas/HealthChecks"
        version:
          type: string
        uptime:
          type: string

    HealthChecks:
      type: object
      required: [database, mqtt, cameras, storage]
      properties:
        database:
          type: string
          enum: [ok, error]
        mqtt:
          type: string
          enum: [connected, disconnected, disabled]
        cameras:
          $ref: "#/components/schemas/CameraHealthCheck"
        storage:
          $ref: "#/components/schemas/StorageHealthCheck"

    CameraHealthCheck:
      type: object
      required: [total, online]
      properties:
        total:
          type: integer
        online:
          type: integer

    StorageHealthCheck:
      type: object
      required: [used_bytes, used, disk_available, disk_low, recording_paused, recompression]
      properties:
        used_bytes:
          type: integer
          format: int64
        used:
          type: string
        disk_available:
          type: string
        disk_low:
          type: boolean
        recording_paused:
          type: boolean
        recompression:
          $ref: "#/components/schemas/RecompressionStats"

    RecompressionStats:
      type: object
      required: [enabled, segments_recompressed, bytes_reclaimed]
      properties:
        enabled:
          type: boolean
        segments_recompressed:
          type: integer
        bytes_reclaimed:
          type: integer
          format: int64
        last_run:
          type: string
          format: date-time

    HealthLiveResponse:
      type: object
      required: [status, uptime]
      properties:
        status:
          type: string
          enum: [ok]
        uptime:
          type: string

    HealthReadyResponse:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ready, starting, degraded]
        checks:
          $ref: "#/components/schemas/ReadyChecks"

    ReadyChecks:
      type: object
      required: [initialized, database, cameras]
      properties:
        initialized:
          type: boolean
        database:
          type: string
        cameras:
          $ref: "#/components/schemas/ReadyCameraCheck"
        storage:
          $ref: "#/components/schemas/ReadyStorageCheck"

    ReadyCameraCheck:
      type: object
      required: [total, degraded]
      properties:
        total:
          type: integer
        degraded:
          type: integer

    ReadyStorageCheck:
      type: object
      properties:
        disk_low:
          type: boolean
        recording_paused:
          type: boolean

    SystemResponse:
      type: object
      required: [version, uptime, decoder, cameras, online, storage_bytes, storage]
      properties:
        version:
          type: string
        uptime:
          type: string
        decoder:
          type: string
        cameras:
          type: integer
        online:
          type: integer
        storage_bytes:
          type: integer
          format: int64
        storage:
          type: string
