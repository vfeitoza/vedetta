openapi: "3.1.0"
info:
  title: Vedetta NVR API
  version: "0.1.0"
  description: API for managing cameras, events, recordings, and object detection in the Vedetta Network Video Recorder.

servers:
  - url: /

security:
  - bearerAuth: []
  - cookieAuth: []

tags:
  - name: auth
    description: Authentication, sessions, and API tokens
  - name: cameras
    description: Camera management, snapshots, PTZ, zones, and doorbell
  - name: discovery
    description: API discovery and documentation
  - name: events
    description: Detection events, snapshots, clips, and identification
  - name: health
    description: Health checks, system info, and metrics
  - name: people
    description: People and face recognition management
  - name: faces
    description: Face detection, assignment, and cropping
  - name: objects
    description: Object re-identification and known object management
  - name: recordings
    description: Recording segments, playback, calendar, and export
  - name: streaming
    description: Live camera streaming (WebRTC, MSE, MJPEG)

paths:
  /api/auth/login:
    post:
      operationId: login
      summary: Authenticate with username and password
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/logout:
    post:
      operationId: logout
      summary: End the current session
      tags: [auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"

  /api/auth/me:
    get:
      operationId: getAuthMe
      summary: Get the current authenticated principal
      tags: [auth]
      responses:
        "200":
          description: Current principal info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/change-password:
    post:
      operationId: changePassword
      summary: Change the current user's password
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/tokens:
    get:
      operationId: listTokens
      summary: List API tokens for the authenticated user
      tags: [auth]
      responses:
        "200":
          description: Token list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenListResponse"
    post:
      operationId: createToken
      summary: Create a new API token
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTokenRequest"
      responses:
        "201":
          description: Token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTokenResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/tokens/{id}:
    delete:
      operationId: deleteToken
      summary: Revoke an API token
      tags: [auth]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenRevokedResponse"

  /api/openapi.json:
    get:
      operationId: getOpenAPISpec
      summary: OpenAPI specification
      tags: [discovery]
      security: []
      responses:
        "200":
          description: The OpenAPI spec as JSON
          content:
            application/json:
              schema:
                type: object

  /api/health:
    get:
      operationId: getHealth
      summary: Full health check
      tags: [health]
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/health/live:
    get:
      operationId: getHealthLive
      summary: Liveness probe
      tags: [health]
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthLiveResponse"

  /api/health/ready:
    get:
      operationId: getHealthReady
      summary: Readiness probe
      tags: [health]
      security: []
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReadyResponse"
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthReadyResponse"

  /api/system:
    get:
      operationId: getSystem
      summary: System information
      tags: [health]
      responses:
        "200":
          description: System info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemResponse"

  /api/system/recompress/trigger:
    post:
      operationId: triggerRecompression
      summary: Trigger manual recompression
      tags: [health]
      responses:
        "202":
          description: Recompression started
        "409":
          description: Recompression already in progress
          content:
            text/plain:
              schema:
                type: string

  /metrics:
    get:
      operationId: getMetrics
      summary: Prometheus metrics
      tags: [health]
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

  /api/cameras:
    get:
      operationId: listCameras
      summary: List all cameras
      tags: [cameras]
      responses:
        "200":
          description: Camera list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CameraListEnvelope"

  /api/cameras/{name}:
    get:
      operationId: getCamera
      summary: Get camera detail
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Camera detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CameraDetail"
        "404":
          description: Camera not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cameras/{name}/snapshot:
    get:
      operationId: getCameraSnapshot
      summary: Get live camera snapshot
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: JPEG snapshot
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "404":
          description: Camera not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cameras/{name}/thumbnail:
    get:
      operationId: getCameraThumbnail
      summary: Get recording thumbnail at a given time
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: t
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: JPEG thumbnail
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid time parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Camera not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cameras/{name}/ptz:
    post:
      operationId: sendPTZCommand
      summary: Send a PTZ command to a camera
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PTZRequest"
      responses:
        "200":
          description: PTZ command accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          description: Invalid request or camera does not support PTZ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Camera not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cameras/{name}/doorbell:
    post:
      operationId: pressDoorbell
      summary: Trigger a doorbell press event
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Doorbell ring accepted (processed asynchronously)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoorbellResponse"
        "404":
          description: Camera not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: No snapshot available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cameras/{name}/doorbell/{event_id}/answer:
    post:
      operationId: answerDoorbell
      summary: Acknowledge (answer) a doorbell ring
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
        - name: event_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Ring acknowledged (idempotent; returns the first answerer)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoorbellAnswerResponse"
        "404":
          description: Ring not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/cameras/{name}/stop:
    post:
      operationId: stopCamera
      summary: Stop a camera (disconnect RTSP, stop detection and recording)
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Camera stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CameraStatus"
        "404":
          description: Camera not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Camera already stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cameras/{name}/start:
    post:
      operationId: startCamera
      summary: Start a stopped camera (reconnect RTSP, resume detection and recording)
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Camera started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CameraStatus"
        "404":
          description: Camera not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Camera already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cameras/{name}/zones:
    get:
      operationId: listZones
      summary: List zones for a camera
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Zone list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZoneListEnvelope"
        "404":
          description: Camera not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createZone
      summary: Create a zone for a camera
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateZoneRequest"
      responses:
        "201":
          description: Zone created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Zone"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Camera not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cameras/{name}/zones/{zone}:
    put:
      operationId: updateZone
      summary: Update a zone
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: zone
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateZoneRequest"
      responses:
        "200":
          description: Zone updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Zone"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Camera or zone not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteZone
      summary: Delete a zone
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: zone
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Zone deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusDeleted"
        "404":
          description: Camera not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/cameras/{name}/zones/{zone}/presence:
    get:
      operationId: getZonePresence
      summary: Get presence state for a zone
      tags: [cameras]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: zone
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Zone presence state
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ZonePresence"
        "404":
          description: Camera or zone not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/events:
    get:
      operationId: listEvents
      summary: List detection events
      tags: [events]
      parameters:
        - name: camera
          in: query
          schema:
            type: string
        - name: label
          in: query
          schema:
            type: string
        - name: zone
          in: query
          schema:
            type: string
        - name: object
          in: query
          schema:
            type: string
        - name: since
          in: query
          description: Only return events after this timestamp
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: kind
          in: query
          description: Filter by event kind ("object" or "doorbell")
          schema:
            type: string
      responses:
        "200":
          description: Event list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListEnvelope"

  /api/events/counts:
    get:
      operationId: getEventCounts
      summary: Get event counts by label and camera
      tags: [events]
      parameters:
        - name: kind
          in: query
          required: false
          schema:
            type: string
          description: Filter by event kind ("object" or "doorbell"). Omit to count all kinds.
      responses:
        "200":
          description: Event counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventCounts"

  /api/events/stream:
    get:
      operationId: getEventStream
      summary: Server-sent event stream
      description: Long-lived SSE connection. Events are JSON-encoded with types including "event", "event_end", "presence", "doorbell", and "keepalive".
      tags: [events]
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /api/events/{id}:
    get:
      operationId: getEvent
      summary: Get a single event
      tags: [events]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/events/{id}/snapshot:
    get:
      operationId: getEventSnapshot
      summary: Get event snapshot image with bounding box overlay
      tags: [events]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: download
          in: query
          description: Set to trigger Content-Disposition attachment header
          schema:
            type: string
        - name: raw
          in: query
          description: Set to serve raw image without bounding box overlay
          schema:
            type: string
      responses:
        "200":
          description: JPEG snapshot
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "404":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/events/{id}/clip:
    get:
      operationId: getEventClip
      summary: Download event video clip
      tags: [events]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: MP4 video clip
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        "404":
          description: Clip not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: reextractClip
      summary: Re-extract event clip from recording segments
      tags: [events]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Clip re-extraction started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReextractClipResponse"
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/events/{id}/detection-crop:
    get:
      operationId: getEventDetectionCrop
      summary: Get cropped detection region from event snapshot
      tags: [events]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: JPEG cropped image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "404":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/events/{id}/identify:
    post:
      operationId: identifyEvent
      summary: Identify object in event using re-identification embeddings
      tags: [events]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching object sightings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ObjectSighting"
        "404":
          description: Event snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Object re-identification not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/events/{id}/track-person:
    post:
      operationId: trackPerson
      summary: Create a person record from an event detection
      tags: [events]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackPersonRequest"
      responses:
        "201":
          description: Person tracked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackPersonResponse"
        "400":
          description: Name is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Event snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/events/{id}/assign-person:
    post:
      operationId: assignPersonToEvent
      summary: Assign a known person to an event or ignore it
      tags: [events]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignPersonRequest"
      responses:
        "200":
          description: Person assigned or event ignored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignPersonResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Person or event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/people:
    get:
      operationId: listPeople
      summary: List all known people
      tags: [people]
      responses:
        "200":
          description: People list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonListEnvelope"

  /api/people/{id}:
    get:
      operationId: getPerson
      summary: Get person detail with recent faces
      tags: [people]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Person detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonDetail"
        "404":
          description: Person not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: updatePerson
      summary: Update a person's name or ignore status
      tags: [people]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePersonRequest"
      responses:
        "200":
          description: Person updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusUpdated"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deletePerson
      summary: Delete a person
      tags: [people]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Person deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusDeleted"
        "400":
          description: Invalid person ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/people/{id}/faces:
    get:
