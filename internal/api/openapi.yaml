            schema:
              $ref: '#/components/schemas/DeleteRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResult'
        '400':
          description: Malformed request
        '409':
          description: Storage operation in progress
        '422':
          description: Request targets currently-open segment(s)

  /api/storage/cleanup:
    post:
      operationId: postStorageCleanup
      summary: Trigger an async retention pass
      tags: [health]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  started:
                    type: boolean
        '409':
          description: Storage operation in progress

  /api/storage/audit:
    get:
      operationId: getStorageAudit
      summary: List recent manual-delete audit rows
      tags: [health]
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StorageAuditEntry'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    cookieAuth:
      type: apiKey
      in: cookie
      name: session

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
        remember:
          type: boolean

    LoginResponse:
      type: object
      required: [username, kind, csrf_token, expires_at]
      properties:
        username:
          type: string
        kind:
          type: string
        csrf_token:
          type: string
        expires_at:
          type: string
          format: date-time

    LogoutResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [logged_out]

    AuthMeResponse:
      type: object
      required: [username, kind, scopes]
      properties:
        username:
          type: string
        kind:
          type: string
        scopes:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
        csrf_token:
          type: string

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string

    CreateTokenRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        scopes:
          type: array
          description: >-
            Scope vocabulary: api:read (safe methods), api:write (mutations),
            tokens:read / tokens:write (token management), admin (config-mutation
            endpoints such as PUT /api/settings/*, /api/cameras/manage*, codec
            install, and password change), and * (all). admin is required for
            config mutation; api:write alone is not sufficient.
          items:
            type: string

    CreateTokenResponse:
      type: object
      required: [id, name, token, token_prefix, scopes, created_at]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        token:
          type: string
        token_prefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    TokenRevokedResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [revoked]

    TokenListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
