  /api/streaming/capabilities:
    get:
      operationId: getStreamingCapabilities
      summary: List every consumable stream URL per camera across all protocols
      description: >
        Agent-readable inventory of all live-stream surfaces Vedetta exposes.
        For each enabled camera it returns the RTSP republish URLs (when the
        rtsp_server is enabled) and the HTTP streaming endpoints (WebRTC, HLS,
        MJPEG, MSE, snapshot). RTSP URLs are absolute, derived from the request
        host; HTTP entries are paths relative to the API base. Use this instead
        of reading source to discover how to consume a camera.
      tags: [streaming]
      responses:
        "200":
          description: Streaming capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamingCapabilities"

