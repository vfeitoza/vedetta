        has_more:
          type: boolean

    ObjectListEnvelope:
      type: object
      required: [items, total, limit, offset, has_more]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/KnownObject"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        has_more:
          type: boolean

    SightingListEnvelope:
      type: object
      required: [items, total, limit, offset, has_more]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ObjectSighting"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        has_more:
          type: boolean

    ReferenceListEnvelope:
      type: object
      required: [items, total, limit, offset, has_more]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ObjectReference"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        has_more:
          type: boolean

    RecordingSummaryResponse:
      type: object
      required: [cameras, total_bytes]
      properties:
        cameras:
          type: array
          items:
            $ref: "#/components/schemas/RecordingSummaryCamera"
        total_bytes:
          type: integer
          format: int64

    StorageBreakdown:
      type: object
      properties:
        recording: { $ref: '#/components/schemas/FilesystemStats' }
        snapshots: { $ref: '#/components/schemas/FilesystemStats' }
        recording_paused: { type: boolean }
        recompression: { $ref: '#/components/schemas/RecompressionStats' }
        projection: { type: object }
        cameras:
          type: array
          items: { $ref: '#/components/schemas/CameraBreakdown' }

    FilesystemStats:
      type: object
      properties:
        used_bytes: { type: integer, format: int64 }
        segment_bytes: { type: integer, format: int64 }
        clip_bytes: { type: integer, format: int64 }
        disk_available: { type: integer, format: int64 }
        root: { type: string }
        same_filesystem_as_recording: { type: boolean }

    CameraBreakdown:
      type: object
      properties:
        name: { type: string }
        segment_bytes: { type: integer, format: int64 }
        clip_bytes: { type: integer, format: int64 }
        oldest_segment: { type: string, format: date-time }
        last_7d_bytes: { type: integer, format: int64 }
        per_day:
          type: array
          items:
            type: object
            properties:
              date: { type: string }
              bytes: { type: integer, format: int64 }
        effective_retain_days: { type: integer }

    DeleteRequest:
      type: object
      required: [target]
      properties:
        target: { type: string, enum: [segments, clips, all, free_bytes] }
        camera: { type: string }
        older_than_days: { type: integer }
        from: { type: string }
        to: { type: string }
        free_bytes_target: { type: integer, format: int64 }

    DeleteResult:
      type: object
      properties:
        segments: { type: integer }
        clips: { type: integer }
        snapshots: { type: integer }
        bytes: { type: integer, format: int64 }
        cameras:
          type: array
          items: { type: string }

    StorageAuditEntry:
      type: object
      properties:
        ts: { type: string, format: date-time }
        actor: { type: string }
        scope: { type: object }
        bytes: { type: integer, format: int64 }
        files: { type: integer }

    StreamingCapabilities:
      type: object
      required: [auth_required, rtsp_server, cameras]
      properties:
        auth_required:
          type: boolean
          description: >
            Whether the RTSP republish and HTTP streaming endpoints require
            Basic Auth credentials (true when auth.users is configured).
        rtsp_server:
          type: object
          required: [enabled, port]
          properties:
            enabled: { type: boolean }
            port: { type: integer }
        cameras:
          type: array
          items: { $ref: "#/components/schemas/CameraStreamCapabilities" }

    CameraStreamCapabilities:
      type: object
      required: [name, streams]
      properties:
        name: { type: string }
        streams:
          $ref: "#/components/schemas/CameraStreamURLs"

    CameraStreamURLs:
      type: object
      description: >
        Consumable stream URLs by protocol. RTSP URLs are absolute (host taken
        from the request); HTTP entries are paths relative to the API base. A
        field is omitted when that protocol is unavailable for the camera
        (e.g. rtsp_main/rtsp_sub absent when rtsp_server is disabled, rtsp_sub
        absent when the camera has no distinct sub-stream).
      properties:
        rtsp_main: { type: string }
        rtsp_sub: { type: string }
        webrtc: { type: string }
        hls: { type: string }
        mjpeg: { type: string }
        mse: { type: string }
        snapshot: { type: string }
