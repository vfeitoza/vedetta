cameras:
  - name: front_door
    url: rtsp://user:pass@192.168.1.100:554/stream1
    record_url: rtsp://user:pass@192.168.1.100:554/stream0  # optional high-res stream
    # RTSP lower transport: tcp (default), udp, or auto. Use udp for cameras
    # whose high-res stream desyncs over TCP (e.g. some Reolink main streams
    # that emit oversized RTCP packets); udp puts RTP/RTCP on their own sockets.
    # rtsp_transport: tcp
    # Optional per-camera override for retain_days. Unset = use recording.retain_days.
    # retain_days: 3
    detect:
      enabled: true
      width: 640
      height: 480
      fps: 5
    record:
      width: 1920
      height: 1080
      fps: 15
    zones:
      - name: driveway
        points:
          - [0.10, 0.50]
          - [0.90, 0.50]
          - [0.90, 1.00]
          - [0.10, 1.00]
        labels: [person, car]
        track_presence: true
        face_recognition: false

detect:
  model_path: ""  # path to ONNX model (e.g., yolov8n.onnx)
  score_threshold: 0.5
  object_match_threshold: 0.75  # cosine similarity threshold for object re-ID (0.0-1.0). Higher avoids matching look-alike vehicles to the wrong named object; per-object overrides are also supported.
  motion:
    pixel_threshold: 25
    min_area: 200
    background_alpha: 0.05
    min_region_score: 0.02

recording:
  path: ./recordings
  continuous: true          # record continuously, not just events
  segment_length: 10m       # length of each continuous segment
  pre_capture: 5s           # seconds before event to include in clip
  post_capture: 10s         # seconds after event to include in clip
  retain_days: 7            # delete continuous segments after N days
  event_retain_days: 30     # keep event clips longer

  # Maximum total storage used by segments (clips are not counted). Triggers
  # proactive trimming of the oldest segments. Recommended: 80-90% of the
  # recording disk size.
  # Default: empty (unlimited — relies purely on retain_days, risky on constrained disks).
  # max_storage: "400GB"

  # Minimum free space required to continue recording. Recording pauses below
  # this floor. The effective threshold is max(min_disk_free, 2x largest recent segment).
  # Should be at least 2x your largest segment size. Default: "2GB".
  min_disk_free: "2GB"

  # Emergency mode: when disk drops below min_disk_free and normal age-based
  # cleanup cannot recover space, drop the oldest segments regardless of
  # retain_days, preserving only min_retention. Prevents silent recording
  # pause when the disk fills completely.
  urgent_cleanup:
    enabled: true
    min_retention: 1h       # keep at least this much, even in emergency
    batch_size: 50          # max segments dropped per emergency pass

  # Tiered storage: scheduled overnight recompression of old continuous
  # segments AND aged event clips to smaller resolutions, freeing disk while
  # preserving history. The same after_days / target / schedule / priority
  # apply to both.
  tiered_storage:
    enabled: false
    after_days: 3           # only recompress segments older than this
    target_width: 1280
    target_height: 720
    schedule: "22:00-06:00" # local time; may span midnight
    interval: 30s           # how often the worker processes one segment in-window
    priority: largest       # "largest" reclaims disk fastest; "oldest" processes FIFO

events:
  cooldown_seconds: 30
  retain_days: 90
  snapshot_path: ./snapshots
  snapshot_quality: 85

storage:
  db_path: ./vedetta.db

mqtt:
  enabled: false
  host: 127.0.0.1
  port: 1883
  topic: vedetta

updates:
  check_enabled: true
  check_interval: 24h

api:
  host: 0.0.0.0
  port: 5050
  exposure: lan
  # allowed_origins:
  #   - https://vedetta.example.com
  # trusted_proxies:
  #   - 127.0.0.1/32
  # tls_cert: /etc/vedetta/tls.crt
  # tls_key: /etc/vedetta/tls.key

# RTSP republish server. When enabled, Vedetta re-publishes every enabled
# camera as a clean RTSP stream that downstream consumers (go2rtc, Frigate,
# VLC, WebRTC gateways) can pull without each one hammering the camera.
#
# Published paths (per camera `name`):
#   rtsp://<host>:<port>/<name>        main stream (record_url, high-res)
#   rtsp://<host>:<port>/<name>_sub    sub stream  (url, low-res; published
#                                      only when url differs from record_url)
#
# The _sub suffix (not a /sub path segment) matches the go2rtc ecosystem
# convention. Auth: when auth.users is configured, RTSP clients must send
# Basic Auth with the same credentials; otherwise the republish is open on
# the LAN. Default port 8554 is the IANA-registered RTSP alternate.
rtsp_server:
  enabled: false
  port: 8554

auth:
  users:
    - username: admin
      # example only: replace with `vedetta auth hash-password <password>`
      password_hash: "$2a$10$7EqJtq98hPqEX7fNZaFWoOHi8V6I5WJFlQ7Y7S6d6n9zQ0jD4S3yu"
  # proxy:
  #   header: "Remote-User"  # trust this header from reverse proxies (Authelia, Authentik, oauth2-proxy)
  #                           # requires api.trusted_proxies to be set
  #                           # Authelia: "Remote-User" (default)
  #                           # Authentik: "X-authentik-username"
  #                           # oauth2-proxy: "X-Forwarded-User"

notifications:
  # Web push VAPID subscriber claim (RFC 8292 "sub"). Used by the push
  # service operator (Apple, Google, Mozilla) to reach you about abuse.
  # Must be a raw email address (e.g. "admin@example.com") — do NOT
  # include the "mailto:" prefix, the push library adds it. You can also
  # use an https:// URL like "https://vedetta.example.com/contact".
  #
  # Apple's push relay rejects the JWT with HTTP 403 BadJwtToken if the
  # value is not well-formed. Unset = fallback to "admin@example.com"
  # with a startup warning; set a real contact for production.
  vapid_subscriber: admin@example.com

# WebRTC ICE servers offered to live-view browsers. By default Vedetta offers
# NONE: LAN viewers connect via local host candidates, and remote viewers fall
# back to MSE/HLS over the TLS tunnel. This avoids leaking each viewer's IP to a
# third-party STUN operator (e.g. Google). Only configure servers here if you
# need UDP-forwarded remote WebRTC; supply your own STUN and/or TURN.
# webrtc:
#   ice_servers:
#     - urls:
#         - stun:stun.example.net:3478
#     - urls:
#         - turn:turn.example.net:3478
#       username: turn-user
#       credential: turn-secret

# Optional OpenTelemetry distributed tracing. Disabled by default: when
# enabled is false, no exporter is created and there is zero overhead.
# Export works with any OTLP-compatible backend (Tempo, Jaeger, Honeycomb,
# Grafana Cloud, an OpenTelemetry Collector, ...). The standard
# OTEL_EXPORTER_OTLP_ENDPOINT / OTEL_EXPORTER_OTLP_PROTOCOL environment
# variables are honored when the fields below are left at their defaults.
tracing:
  enabled: false
  # OTLP endpoint. A scheme-less host:port (paired with insecure below) or a
  # full URL (e.g. https://otel.example.com). Empty + enabled falls back to
  # OTEL_EXPORTER_OTLP_ENDPOINT.
  endpoint: ""
  # "http" (OTLP/HTTP, default port 4318) or "grpc" (OTLP/gRPC, default 4317).
  protocol: http
  # Send plaintext OTLP for scheme-less host:port endpoints on a trusted LAN.
  # Ignored for https:// URLs.
  insecure: true
  service_name: vedetta
  # Headers attached to every OTLP trace export request. The common use is a
  # tenant header for a multi-tenant backend, e.g. X-Scope-OrgID for Tempo. Omit
  # when the backend needs none.
  # headers:
  #   X-Scope-OrgID: vedetta

# Optional OTLP log export (opt-in, default off). When enabled, logs are written
# to both stdout (as before) AND shipped to an OpenTelemetry collector (e.g. for
# Loki). Construction failures degrade to stdout-only; export never blocks or
# crashes the process.
logging:
  enabled: false
  # OTLP endpoint. A scheme-less host:port (paired with insecure below) or a full
  # URL. Empty reuses the tracing endpoint above; if that is also empty the
  # exporter reads OTEL_EXPORTER_OTLP_LOGS_ENDPOINT then OTEL_EXPORTER_OTLP_ENDPOINT.
  endpoint: ""
  # "http" or "http/protobuf" (both use OTLP/HTTP) or "grpc". Leave empty to reuse
  # the tracing protocol when reusing the tracing endpoint; otherwise it reads
  # OTEL_EXPORTER_OTLP_LOGS_PROTOCOL then OTEL_EXPORTER_OTLP_PROTOCOL, defaulting
  # to OTLP/HTTP.
  protocol: ""
  # Send plaintext OTLP for scheme-less host:port endpoints on a trusted LAN.
  # Ignored for https:// URLs. Only applies to a logging endpoint of its own; a
  # reused tracing endpoint keeps tracing's insecure flag.
  insecure: true
  service_name: vedetta
  # Headers attached to every OTLP log export request. The common use is a tenant
  # header for a multi-tenant backend, e.g. X-Scope-OrgID for Loki. Omit when the
  # backend needs none.
  # headers:
  #   X-Scope-OrgID: vedetta

  # Local log file with built-in size-based rotation. When set, vedetta writes
  # its own logs here instead of stdout and rotates them so they never grow
  # unbounded. Leave empty (the default) to log to stdout, which the process
  # supervisor (launchd / container runtime) captures. When set under launchd,
  # point this at a path distinct from the plist's StandardOutPath so the two
  # writers do not fight over the same file.
  file: ""
  # Rotate when the active file reaches this size (megabytes). Default 50.
  max_size_mb: 50
  # Keep this many rotated files (file.1 .. file.N). Default 5.
  max_backups: 5
